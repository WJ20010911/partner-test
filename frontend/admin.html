<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - 伴侣匹配测试</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:16px; margin-bottom:24px; }
    .stat-card { background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:20px; text-align:center; }
    .stat-card .num { font-size:32px; font-weight:700; color:var(--primary-dark); }
    .stat-card .label { font-size:13px; color:var(--text-light); margin-top:4px; }
    .login-box { max-width:360px; margin:60px auto; text-align:center; }
    .login-box input { width:100%; padding:12px 16px; font-size:16px; border:1px solid var(--border); border-radius:8px; box-sizing:border-box; margin-bottom:12px; }
    .login-box .error { color:#e88d9e; font-size:14px; margin-top:8px; }
    .admin-table { width:100%; border-collapse:collapse; }
    .admin-table th,.admin-table td { padding:10px 12px; text-align:left; border-bottom:1px solid var(--border); font-size:14px; }
    .admin-table th { background:var(--bg); font-weight:600; color:var(--text-light); }
    .admin-table tr:hover { background:var(--bg); }
    .tag { display:inline-block; padding:2px 8px; border-radius:4px; background:#e8f4f8; color:var(--primary-dark); font-size:12px; margin:2px; }
    #admin-content { min-height:200px; }
    .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin .8s linear infinite; margin:40px auto; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .flash { padding:10px 16px; border-radius:8px; margin-bottom:16px; font-size:14px; }
    .flash.success { background:#d4edda; color:#155724; border:1px solid #c3e6cb; }
    .flash.error { background:#f8d7da; color:#721c24; border:1px solid #f5c6cb; }
    .admin-main { display:none; }
    .tab-bar { display:flex; flex-wrap:wrap; gap:0; margin-bottom:20px; border-bottom:2px solid var(--border); }
    .tab-bar button { padding:10px 14px; border:none; background:none; cursor:pointer; font-weight:500; color:var(--text-light); border-bottom:3px solid transparent; transition:all .2s; font-size:13px; white-space:nowrap; }
    .tab-bar button.active { color:var(--primary-dark); font-weight:600; border-bottom-color:var(--primary); }
    .complaint-card { border:1px solid var(--border); border-radius:10px; padding:14px 16px; margin-bottom:12px; background:var(--bg); }
    .complaint-card.high-risk { border-left:4px solid #e88d9e; background:#fff8f8; }
    .complaint-card.low-risk { border-left:4px solid #ccc; }
    .complaint-header { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
    .complaint-body { flex:1; min-width:0; }
    .complaint-body .qtext { font-size:14px; font-weight:500; margin-bottom:6px; word-break:break-word; }
    .complaint-meta { display:flex; gap:16px; font-size:13px; color:var(--text-light); flex-wrap:wrap; }
    .complaint-meta .badge { display:inline-block; padding:2px 10px; border-radius:12px; font-size:12px; font-weight:600; }
    .badge-danger { background:#fce4ec; color:#c62828; }
    .badge-warning { background:#fff3e0; color:#e65100; }
    .badge-ok { background:#e8f5e9; color:#2e7d32; }
    .complaint-actions { white-space:nowrap; padding-left:8px; }
    .toggle-link { color:var(--primary-dark); cursor:pointer; font-size:13px; text-decoration:underline; display:inline-block; margin-top:4px; }
    .toggle-link:hover { color:var(--primary); }
    .minor-list { display:none; margin-top:8px; }
    .minor-list.show { display:block; }
    .threshold-note { font-size:13px; color:var(--text-light); margin-bottom:12px; padding:8px 12px; background:var(--bg); border-radius:8px; }
    .bar-chart { display:flex; align-items:flex-end; gap:6px; height:160px; padding:10px 0; }
    .bar-chart .bar { flex:1; min-width:20px; border-radius:4px 4px 0 0; position:relative; background:var(--primary); opacity:0.8; transition:opacity .2s; cursor:pointer; }
    .bar-chart .bar:hover { opacity:1; }
    .bar-chart .bar .bar-label { position:absolute; bottom:-22px; left:50%; transform:translateX(-50%); font-size:11px; color:var(--text-light); white-space:nowrap; }
    .bar-chart .bar .bar-val { position:absolute; top:-18px; left:50%; transform:translateX(-50%); font-size:11px; font-weight:600; color:var(--primary-dark); }
    .settings-form { max-width:400px; }
    .settings-form label { display:block; font-size:14px; font-weight:500; margin-bottom:4px; color:var(--text-light); }
    .settings-form input { width:100%; padding:10px 14px; font-size:14px; border:1px solid var(--border); border-radius:8px; box-sizing:border-box; margin-bottom:16px; }
    .user-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
    .user-row .user-info { flex:1; }
    .user-row .user-info .email { font-weight:500; font-size:14px; }
    .user-row .user-info .meta { font-size:12px; color:var(--text-light); }
    .banned-tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; background:#fce4ec; color:#c62828; margin-left:8px; }
    .tag-chip { display:inline-block; padding:4px 12px; border-radius:16px; background:#e8f4f8; color:var(--primary-dark); font-size:13px; margin:3px; }
    .log-entry { padding:8px 0; border-bottom:1px solid var(--border); font-size:13px; display:flex; gap:12px; }
    .log-entry .log-time { color:var(--text-light); white-space:nowrap; min-width:140px; }
    .log-entry .log-action { font-weight:500; min-width:80px; }
    .log-entry .log-detail { color:var(--text-light); }
    .section-title { font-size:15px; font-weight:600; color:var(--primary-dark); margin-bottom:12px; margin-top:20px; }
    .section-title:first-child { margin-top:0; }
    .pending-badge { display:none; background:#e53935; color:#fff; font-size:11px; font-weight:700; padding:1px 7px; border-radius:10px; margin-left:5px; vertical-align:top; line-height:1.5; }
    .pending-badge.show { display:inline-block; }
    @keyframes badge-pop { 0%{transform:scale(0.5)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }
    .pending-badge.pop { animation:badge-pop .3s ease-out; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/index.html" class="nav-brand">伴侣匹配测试</a>
    <div class="nav-links">
      <a href="/index.html">首页</a>
    </div>
  </nav>

  <!-- Login Screen -->
  <div class="container" id="login-screen">
    <div class="card login-box">
      <h2 style="color:var(--primary-dark);margin-bottom:8px;">管理后台</h2>
      <p style="color:var(--text-light);font-size:14px;margin-bottom:24px;">请输入管理员密码</p>
      <input type="password" id="admin-password" placeholder="请输入密码" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="btn btn-primary" onclick="doLogin()" style="width:100%;">进入后台</button>
      <div id="login-error" class="error"></div>
    </div>
  </div>

  <!-- Admin Main Screen -->
  <div class="container admin-main" id="admin-main">
    <div class="card" id="stats-overview-card">
      <h2 style="color:var(--primary-dark);margin-bottom:20px;">数据概览</h2>
      <div class="stats-grid">
        <div class="stat-card"><div class="num" id="stat-total">-</div><div class="label">测试总人次</div></div>
        <div class="stat-card"><div class="num" id="stat-max">-</div><div class="label">最高分</div></div>
        <div class="stat-card"><div class="num" id="stat-min">-</div><div class="label">最低分</div></div>
        <div class="stat-card"><div class="num" id="stat-avg">-</div><div class="label">平均分</div></div>
        <div class="stat-card"><div class="num" id="stat-questions">-</div><div class="label">题库总量</div></div>
      </div>
    </div>

    <div class="card">
      <div class="tab-bar">
        <button class="active" id="tab-overview" onclick="switchTab('overview')">概览</button>
        <button id="tab-pending" onclick="switchTab('pending')">待审核<span id="pending-badge" class="pending-badge"></span></button>
        <button id="tab-all" onclick="switchTab('all')">全部题库</button>
        <button id="tab-complaints" onclick="switchTab('complaints')">投诉</button>
        <button id="tab-users" onclick="switchTab('users')">用户</button>
        <button id="tab-tags" onclick="switchTab('tags')">标签</button>
        <button id="tab-logs" onclick="switchTab('logs')">日志</button>
        <button id="tab-backup" onclick="switchTab('backup')">备份</button>
        <button id="tab-settings" onclick="switchTab('settings')">设置</button>
      </div>
      <div id="admin-content" style="min-height:300px;"><div class="spinner"></div></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    var ADMIN_TOKEN_KEY = 'admin_token';
    var currentTab = 'overview';
    var pendingPollTimer = null;
    var autoRefreshTimer = null;
    var AUTO_REFRESH_MS = 30000; // 30秒自动刷新当前标签页

    function getAdminToken() { return localStorage.getItem(ADMIN_TOKEN_KEY); }
    function setAdminToken(t) { localStorage.setItem(ADMIN_TOKEN_KEY, t); }
    function clearAdminToken() { localStorage.removeItem(ADMIN_TOKEN_KEY); }

    (function init() {
      var token = getAdminToken();
      if (token) { api.setToken(token); showAdmin(); }
    })();

    async function doLogin() {
      var pw = document.getElementById('admin-password');
      var err = document.getElementById('login-error');
      err.textContent = '';
      if (!pw.value) { err.textContent = '请输入密码'; return; }
      try {
        var res = await api.adminAuth(pw.value);
        setAdminToken(res.access_token);
        api.setToken(res.access_token);
        showAdmin();
      } catch (e) {
        err.textContent = '密码错误';
      }
    }

    async function showAdmin() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-main').style.display = 'block';
      loadOverview();
      updatePendingBadge();
      if (pendingPollTimer) clearInterval(pendingPollTimer);
      pendingPollTimer = setInterval(updatePendingBadge, 60000);
      // 启动自动刷新
      startAutoRefresh();
    }

    function switchTab(tab) {
      currentTab = tab;
      // 切换标签时重启自动刷新
      restartAutoRefresh();
      document.querySelectorAll('.tab-bar button').forEach(function(b) {
        b.classList.toggle('active', b.id === 'tab-' + tab);
      });
      var container = document.getElementById('admin-content');
      container.innerHTML = '<div class="spinner"></div>';
      if (tab === 'overview') loadOverview();
      else if (tab === 'pending') {
        loadPending();
        // Mark all pending as seen
        api.adminQuestionStats().then(function(qs) {
          localStorage.setItem('lastSeenPending', qs.pending || 0);
          updatePendingBadge();
        }).catch(function() {});
      }
      else if (tab === 'all') loadAll();
      else if (tab === 'complaints') loadComplaints();
      else if (tab === 'users') loadUsers();
      else if (tab === 'tags') loadTags();
      else if (tab === 'logs') loadLogs();
      else if (tab === 'backup') loadBackup();
      else if (tab === 'settings') loadSettings();
    }

    // ─── Overview ───
    async function loadOverview() {
      var container = document.getElementById('admin-content');
      try {
        var s = await api.adminStats();
        document.getElementById('stat-total').textContent = s.total_tests;
        document.getElementById('stat-max').textContent = s.max_score != null ? s.max_score : '-';
        document.getElementById('stat-min').textContent = s.min_score != null ? s.min_score : '-';
        document.getElementById('stat-avg').textContent = s.avg_score != null ? s.avg_score : '-';
        document.getElementById('stat-questions').textContent = s.question_count;

        var html = '<div class="section-title">分数分布</div>';
        var dist = await api.adminScoreDistribution();
        if (dist && dist.buckets) {
          var maxVal = Math.max(...Object.values(dist.buckets), 1);
          html += '<div class="bar-chart">';
          Object.keys(dist.buckets).forEach(function(k) {
            var h = Math.max(4, (dist.buckets[k] / maxVal) * 140);
            html += '<div class="bar" style="height:' + h + 'px" title="' + k + ': ' + dist.buckets[k] + '人">';
            html += '<div class="bar-val">' + dist.buckets[k] + '</div>';
            html += '<div class="bar-label">' + k + '</div></div>';
          });
          html += '</div>';
        }

        html += '<div class="section-title">近期测试趋势</div>';
        var trend = await api.adminTestTrend();
        if (trend && trend.daily && trend.daily.length) {
          var maxCnt = Math.max(...trend.daily.map(function(d) { return d.count; }), 1);
          html += '<div class="bar-chart">';
          trend.daily.forEach(function(d) {
            var h = Math.max(4, (d.count / maxCnt) * 140);
            html += '<div class="bar" style="height:' + h + 'px" title="' + d.date + ': ' + d.count + '次">';
            html += '<div class="bar-val">' + d.count + '</div>';
            html += '<div class="bar-label">' + d.date.slice(5) + '</div></div>';
          });
          html += '</div>';
        } else {
          html += '<p style="color:var(--text-light);font-size:13px;">暂无数据</p>';
        }

        html += '<div class="section-title">题目状态</div>';
        var qs = await api.adminQuestionStats();
        html += '<div class="stats-grid" style="grid-template-columns:repeat(4,1fr);">';
        html += '<div class="stat-card"><div class="num" style="font-size:24px;">' + qs.approved + '</div><div class="label">已通过</div></div>';
        html += '<div class="stat-card"><div class="num" style="font-size:24px;">' + qs.pending + '</div><div class="label">待审核</div></div>';
        html += '<div class="stat-card"><div class="num" style="font-size:24px;color:#e88d9e;">' + qs.rejected + '</div><div class="label">已驳回</div></div>';
        html += '<div class="stat-card"><div class="num" style="font-size:24px;">' + qs.total + '</div><div class="label">总计</div></div>';
        html += '</div>';

        container.innerHTML = html;
      } catch (e) {
        container.innerHTML = '<p style="color:#721c24;text-align:center;">加载失败: ' + e.message + '</p>';
      }
    }

    // ─── Pending Questions ───
    async function loadPending() {
      var container = document.getElementById('admin-content');
      try {
        var questions = await api.getPendingQuestions();
        if (!questions.length) {
          container.innerHTML = '<p style="color:var(--text-light);text-align:center;">暂无待审核题目</p>';
          return;
        }
        var html = '<div class="section-title">待审核题目 (' + questions.length + ')</div>';
        html += '<table class="admin-table"><thead><tr><th>题目</th><th>选项</th><th>操作</th></tr></thead><tbody>';
        for (var i = 0; i < questions.length; i++) {
          var q = questions[i];
          html += '<tr>';
          html += '<td style="max-width:200px;word-break:break-all;">' + escapeHtml(q.content) + '</td>';
          html += '<td style="font-size:13px;">';
          for (var j = 0; j < q.options.length; j++) {
            html += '[' + q.options[j].score + '分] ' + escapeHtml(q.options[j].text) + '<br>';
          }
          html += '</td>';
          html += '<td style="white-space:nowrap;">';
          html += '<button class="btn btn-sm btn-secondary" onclick="approve(\'' + q.id + '\')" style="margin-right:4px;">通过</button>';
          html += '<button class="btn btn-sm btn-outline" style="border-color:#e88d9e;color:#e88d9e;" onclick="reject(\'' + q.id + '\')">驳回</button>';
          html += '</td></tr>';
        }
        html += '</tbody></table>';
        container.innerHTML = html;
      } catch (e) {
        container.innerHTML = '<p style="color:#721c24;text-align:center;">加载失败: ' + e.message + '</p>';
      }
    }

    // ─── All Questions ───
    var allQuestions = [];
    var dimFilter = '';
    var searchQuery = '';
    var tagFilter = '';

    async function loadAll() {
      var container = document.getElementById('admin-content');
      try {
        allQuestions = await api.getAllQuestions();
        if (!allQuestions.length) {
          container.innerHTML = '<p style="color:var(--text-light);text-align:center;">暂无题目</p>';
          return;
        }
        renderAllTable();
      } catch (e) {
        container.innerHTML = '<p style="color:#721c24;text-align:center;">加载失败: ' + e.message + '</p>';
      }
    }

    function setDimFilter(dim) {
      dimFilter = (dimFilter === dim) ? '' : dim;
      renderAllTable();
    }

    function filterByTag(tag) {
      tagFilter = (tagFilter === tag) ? '' : tag;
      searchQuery = '';
      dimFilter = '';
      switchTab('all');
    }

    function doSearch() {
      var val = document.getElementById('q-search').value;
      searchQuery = val.toLowerCase();
      renderAllTable();
    }

    function renderAllTable() {
      var container = document.getElementById('admin-content');
      var filtered = allQuestions.filter(function(q) {
        // Dimension filter
        if (dimFilter && (q.dimension || '') !== dimFilter) return false;
        // Tag filter
        if (tagFilter && (!q.tags || q.tags.indexOf(tagFilter) === -1)) return false;
        // Text search
        if (searchQuery) {
          var qText = (q.content || '').toLowerCase();
          var optsText = (q.options || []).map(function(o) { return o.text || ''; }).join(' ').toLowerCase();
          if (qText.indexOf(searchQuery) === -1 && optsText.indexOf(searchQuery) === -1) return false;
        }
        return true;
      });

      // Collect unique dimensions
      var dims = {};
      allQuestions.forEach(function(q) { var d = q.dimension || '未分类'; dims[d] = (dims[d] || 0) + 1; });
      var dimNames = Object.keys(dims).sort();

      var html = '<div class="section-title">全部题库 (' + filtered.length + ' / ' + allQuestions.length + ' 题)</div>';

      // Search bar
      html += '<div style="margin-bottom:10px;display:flex;gap:8px;">';
      html += '<input type="text" id="q-search" placeholder="搜索题干或选项..." value="' + escapeHtml(searchQuery) + '" onkeydown="if(event.key===\'Enter\')doSearch()" style="flex:1;padding:10px 14px;font-size:14px;border:1px solid var(--border);border-radius:8px;box-sizing:border-box;">';
      html += '<button class="btn btn-primary" onclick="doSearch()" style="white-space:nowrap;">搜索</button>';
      html += '</div>';

      // Tag filter indicator
      if (tagFilter) {
        html += '<div style="margin-bottom:8px;font-size:13px;color:var(--primary-dark);">标签筛选: <span class="tag-chip" style="background:var(--primary-dark);color:#fff;">' + escapeHtml(tagFilter) + '</span> <span class="tag-chip" onclick="filterByTag(\'\')" style="cursor:pointer;border:1px dashed #999;color:#999;">✕ 清除</span></div>';
      }

      // Dimension filter chips
      html += '<div style="margin-bottom:10px;display:flex;flex-wrap:wrap;gap:6px;">';
      dimNames.forEach(function(d) {
        var active = (dimFilter === d) ? ' style="background:var(--primary-dark);color:#fff;border-color:var(--primary-dark);"' : '';
        html += '<span class="tag-chip" onclick="setDimFilter(\'' + escapeHtml(d) + '\')"' + active + '>' + escapeHtml(d) + ' (' + dims[d] + '题)</span>';
      });
      if (dimFilter) {
        html += '<span class="tag-chip" onclick="setDimFilter(\'\')" style="cursor:pointer;border:1px dashed #999;color:#999;">✕ 清除筛选</span>';
      }
      html += '</div>';

      html += '<div id="batch-bar" style="margin-bottom:8px;display:flex;gap:8px;align-items:center;"></div>';
      html += '<table class="admin-table"><thead><tr><th style="width:32px;"><input type="checkbox" id="select-all" onchange="toggleSelectAll()"></th><th>状态</th><th>维度</th><th>限时</th><th>题目</th><th>选项</th><th>标签</th><th>提交者</th><th>操作</th></tr></thead><tbody>';
      for (var i = 0; i < filtered.length; i++) {
        var q = filtered[i];
        var statusLabel = q.status === 'approved' ? '<span style="color:#2e7d32;">已通过</span>' : q.status === 'pending' ? '<span style="color:#e65100;">待审核</span>' : '<span style="color:#c62828;">已驳回</span>';
        html += '<tr id="qrow-' + q.id + '">';
        html += '<td><input type="checkbox" class="q-checkbox" value="' + q.id + '" onchange="updateBatchBar()"></td>';
        html += '<td style="font-size:12px;white-space:nowrap;">' + statusLabel + '</td>';
        html += '<td style="font-size:12px;color:var(--text-light);">' + escapeHtml(q.dimension || '-') + '</td>';
        html += '<td style="font-size:12px;color:var(--text-light);">' + (q.time_limit ? q.time_limit + 's' : '-') + '</td>';
        html += '<td style="max-width:180px;word-break:break-all;font-size:13px;">' + escapeHtml(q.content) + '</td>';
        html += '<td style="font-size:12px;">';
        for (var j = 0; j < q.options.length; j++) {
          html += '[' + q.options[j].score + '分] ' + escapeHtml(q.options[j].text) + '<br>';
        }
        html += '</td>';
        html += '<td style="font-size:12px;">' + (q.tags || []).map(function(t) { return '<span class="tag">' + escapeHtml(t) + '</span>'; }).join(' ') + '</td>';
        html += '<td style="font-size:12px;color:var(--text-light);">' + escapeHtml(q.submitter || '-') + '</td>';
        html += '<td style="white-space:nowrap;">';
        html += '<button class="btn btn-sm btn-outline" onclick="openEditModal(\'' + q.id + '\')" style="margin-right:4px;">编辑</button>';
        if (q.status === 'pending') {
          html += '<button class="btn btn-sm btn-secondary" onclick="approve(\'' + q.id + '\')" style="margin-right:4px;">通过</button>';
          html += '<button class="btn btn-sm btn-outline" style="border-color:#e88d9e;color:#e88d9e;" onclick="reject(\'' + q.id + '\')" style="margin-right:4px;">驳回</button>';
        }
        html += '<button class="btn btn-sm btn-outline" style="border-color:#e88d9e;color:#e88d9e;" onclick="deleteQuestion(\'' + q.id + '\')">删除</button>';
        html += '</td></tr>';
      }
      html += '</tbody></table>';
      container.innerHTML = html;
      updateBatchBar();
    }

    function toggleSelectAll() {
      var checked = document.getElementById('select-all').checked;
      document.querySelectorAll('.q-checkbox').forEach(function(cb) { cb.checked = checked; });
      updateBatchBar();
    }

    function updateBatchBar() {
      var selected = Array.from(document.querySelectorAll('.q-checkbox:checked')).map(function(cb) { return cb.value; });
      var bar = document.getElementById('batch-bar');
      if (!bar) return;
      if (selected.length === 0) {
        bar.innerHTML = '';
      } else {
        bar.innerHTML = '<span style="font-size:13px;color:var(--text-light);">已选 ' + selected.length + ' 题</span>' +
          '<button class="btn btn-sm btn-outline" style="border-color:#e88d9e;color:#e88d9e;" onclick="batchDelete()">批量删除</button>' +
          '<button class="btn btn-sm btn-outline" style="border-color:#ffa726;color:#ffa726;" onclick="batchSetTimelimit()">批量设置限时</button>';
      }
    }

    async function batchDelete() {
      var selected = Array.from(document.querySelectorAll('.q-checkbox:checked')).map(function(cb) { return cb.value; });
      if (selected.length === 0) return;
      if (!confirm('确定要删除选中的 ' + selected.length + ' 道题吗？此操作不可撤销。')) return;
      var pw = prompt('请输入管理员密码确认批量删除：');
      if (!pw) return;
      try {
        await api.adminBatchDelete(selected, pw);
        showFlash('已删除 ' + selected.length + ' 道题', 'success');
        loadAll();
      } catch (e) {
        showFlash('删除失败: ' + e.message, 'error');
      }
    }

    async function batchSetTimelimit() {
      var selected = Array.from(document.querySelectorAll('.q-checkbox:checked')).map(function(cb) { return cb.value; });
      if (selected.length === 0) return;
      var seconds = prompt('为选中的 ' + selected.length + ' 道题设置限时（秒），输入 0 表示不限时：', '15');
      if (seconds === null) return;
      var tl = parseInt(seconds);
      if (isNaN(tl) || tl < 0) { showFlash('请输入有效数字', 'error'); return; }
      var pw = prompt('请输入管理员密码确认批量设置限时：');
      if (!pw) return;
      try {
        await api.adminBatchSetTimeLimit(selected, tl, pw);
        showFlash('已为 ' + selected.length + ' 道题设置限时 ' + tl + ' 秒', 'success');
        loadAll();
      } catch (e) {
        showFlash('设置失败: ' + e.message, 'error');
      }
    }

    // ─── Auto Refresh ───
    function startAutoRefresh() {
      if (autoRefreshTimer) clearInterval(autoRefreshTimer);
      autoRefreshTimer = setInterval(refreshCurrentTab, AUTO_REFRESH_MS);
    }
    function restartAutoRefresh() {
      if (autoRefreshTimer) clearInterval(autoRefreshTimer);
      autoRefreshTimer = setInterval(refreshCurrentTab, AUTO_REFRESH_MS);
    }
    function refreshCurrentTab() {
      if (currentTab === 'overview') { loadOverview(); }
      else if (currentTab === 'pending') { loadPending(); }
      else if (currentTab === 'all') { loadAll(); }
      else if (currentTab === 'complaints') { loadComplaints(); }
      else if (currentTab === 'users') { loadUsers(); }
      else if (currentTab === 'logs') { loadLogs(); }
      else if (currentTab === 'backup') { loadBackup(); }
      // tags 和 settings 不自动刷新（很少变化）
    }

    // ─── Pending Badge ───
    function updatePendingBadge() {
      api.adminQuestionStats().then(function(qs) {
        var total = qs.pending || 0;
        var lastSeen = parseInt(localStorage.getItem('lastSeenPending') || '0');
        var diff = total - lastSeen;
        var badge = document.getElementById('pending-badge');
        if (!badge) return;
        if (diff > 0) {
          badge.textContent = '+' + diff;
          if (!badge.classList.contains('show')) {
            badge.classList.add('show', 'pop');
            setTimeout(function() { badge.classList.remove('pop'); }, 300);
          }
        } else if (total > 0) {
          badge.textContent = total;
          badge.classList.add('show');
        } else {
          badge.classList.remove('show');
        }
      }).catch(function() {});
    }

    async function saveEdit() {
      var qid = document.getElementById('edit-qid').value;
      var password = document.getElementById('edit-password').value;
      if (!password) {
        document.getElementById('edit-flash').innerHTML = '<div class="flash flash-error">请输入管理员密码确认修改</div>';
        return;
      }
      var optionRows = document.querySelectorAll('#edit-options .edit-option-row');
      var options = [];
      for (var i = 0; i < optionRows.length; i++) {
        var text = optionRows[i].querySelector('.edit-opt-text').value.trim();
        var score = parseFloat(optionRows[i].querySelector('.edit-opt-score').value) || 0;
        if (text) { options.push({ text: text, score: score }); }
      }
      if (options.length < 2) {
        document.getElementById('edit-flash').innerHTML = '<div class="flash flash-error">至少需要 2 个选项</div>';
        return;
      }
      var data = {
        password: password,
        content: document.getElementById('edit-content').value,
        options: options,
        dimension: document.getElementById('edit-dimension').value.trim(),
        weight: parseFloat(document.getElementById('edit-weight').value) || 1.0,
        time_limit: parseInt(document.getElementById('edit-timelimit').value) || 0,
        tags: document.getElementById('edit-tags').value.split(',').map(function(s) { return s.trim(); }).filter(Boolean),
      };
      try {
        await api.updateQuestion(qid, data);
        document.getElementById('edit-flash').innerHTML = '<div class="flash flash-success">修改成功</div>';
        document.getElementById('edit-password').value = '';
        setTimeout(function() { closeEditModal(); loadAll(); }, 800);
      } catch (e) {
        document.getElementById('edit-flash').innerHTML = '<div class="flash flash-error">' + escapeHtml(e.message) + '</div>';
      }
    }

    // ─── Complaints ───
    async function loadComplaints() {
      var container = document.getElementById('admin-content');
      try {
        var data = await api.getComplaints();
        if (!data.length) {
          container.innerHTML = '<p style="color:var(--text-light);text-align:center;">暂无投诉记录</p>';
          return;
        }
        var highRisk = [];
        var minor = [];
        data.forEach(function(c) {
          if (c.ratio >= 0.1 && c.complaint_count >= 5) { highRisk.push(c); }
          else { minor.push(c); }
        });
        var html = '';
        if (highRisk.length) {
          html += '<p class="threshold-note" style="color:#c62828;">⚠ 以下题目投诉比例较高，建议优先处理</p>';
          highRisk.forEach(function(c) { html += renderComplaintCard(c, true); });
        }
        if (minor.length) {
          html += '<p class="threshold-note">以下题目投诉比例较低，' + minor.length + ' 条</p>';
          html += '<a class="toggle-link" onclick="toggleMinor()" id="minor-toggle">展开查看低比例投诉 ▼</a>';
          html += '<div class="minor-list" id="minor-list">';
          minor.forEach(function(c) { html += renderComplaintCard(c, false); });
          html += '</div>';
        }
        container.innerHTML = html;
      } catch (e) {
        container.innerHTML = '<p style="color:#721c24;text-align:center;">加载失败: ' + e.message + '</p>';
      }
    }

    function renderComplaintCard(c, highRisk) {
      var pct = (c.ratio * 100).toFixed(1);
      var badgeClass = highRisk ? 'badge-danger' : (c.ratio >= 0.05 ? 'badge-warning' : 'badge-ok');
      var cardClass = highRisk ? 'complaint-card high-risk' : 'complaint-card low-risk';
      return '<div class="' + cardClass + '">' +
        '<div class="complaint-header">' +
          '<div class="complaint-body">' +
            '<div class="qtext">' + escapeHtml(c.question_content) + '</div>' +
            '<div class="complaint-meta">' +
              '<span>投诉 <strong>' + c.complaint_count + '</strong> 次</span>' +
              '<span>答题 <strong>' + c.answered_count + '</strong> 人</span>' +
              '<span><span class="badge ' + badgeClass + '">投诉率 ' + pct + '%</span></span>' +
            '</div>' +
          '</div>' +
          '<div class="complaint-actions">' +
            '<button class="btn btn-sm btn-outline" style="border-color:#e88d9e;color:#e88d9e;" onclick="deleteQuestion(\'' + c.question_id + '\')">删除此题</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    }

    var minorVisible = false;
    function toggleMinor() {
      minorVisible = !minorVisible;
      document.getElementById('minor-list').classList.toggle('show', minorVisible);
      document.getElementById('minor-toggle').textContent = minorVisible ? '收起低比例投诉 ▲' : '展开查看低比例投诉 ▼';
    }

          html += '<span class="meta">' + u.role + (u.banned ? '<span class="banned-tag">已封禁</span>' : '') + ' · ' + (u.created_at || '').slice(0,10) + '</span></div>';

    async function fullRestore() {

      if (!input || !input.files || !input.files[0]) {
        showFlash('请先选择备份文件', 'error');
        return;
      }
      if (!confirm('⚠ 确定要执行秽土转生吗？\n\n这会清空当前服务器的：题库、测试记录、投诉、日志、昵称等全部数据。\n然后导入文件中的备份数据。\n\n管理员账户不受影响。\n此操作不可撤销！')) return;
      try {
        var text = await input.files[0].text();
        var data = JSON.parse(text);
        if (!data.questions) {
          showFlash('无效的备份文件：缺少 questions 字段', 'error');
          return;
        }
        var result = await api.adminFullRestore(data);
        showFlash('秽土转生成功！已恢复 ' + JSON.stringify(result.counts) + '', 'success');
      } catch (e) {
        showFlash('恢复失败: ' + e.message, 'error');
      }
    }

      var html = '<div class="section-title">备份管理</div>';

      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">';

      html += '<div style="border:1px solid var(--border);border-radius:10px;padding:16px;">';

      html += '<div style="border:1px solid var(--border);border-radius:10px;padding:16px;">';
      html += '<div class="section-title" style="margin-top:0;">导入恢复</div>';
      html += '<p style="color:var(--text-light);font-size:13px;margin-bottom:12px;">从备份 JSON 文件恢复测试记录（会跳过已存在的记录 ID，不会覆盖现有数据）</p>';
      html += '<input type="file" id="backup-file-input" accept=".json" style="margin-bottom:12px;display:block;">';
      html += '<button class="btn btn-primary" onclick="importBackup()">上传并恢复</button>';
      html += '</div>';

      html += '</div>';

      // Show backup stats
      html += '<div style="margin-top:24px;">';
      html += '<div class="section-title">备份状态</div>';
      try {
        var stats = await api.adminStats();
        var bkStats = await api.adminBackupExport();
        html += '<div class="stats-grid" style="grid-template-columns:repeat(3,1fr);">';
        html += '<div class="stat-card"><div class="num" style="font-size:24px;">' + (bkStats.test_records ? bkStats.test_records.length : '?') + '</div><div class="label">backup_records 条数</div></div>';
        html += '<div class="stat-card"><div class="num" style="font-size:24px;">' + (bkStats.tester_nicknames ? bkStats.tester_nicknames.length : '?') + '</div><div class="label">昵称记录数</div></div>';
        html += '<div class="stat-card"><div class="num" style="font-size:24px;color:var(--text-light);">' + (bkStats.exported_at || '').slice(0,10) + '</div><div class="label">数据时间</div></div>';
        html += '</div>';
      } catch (e) {
        html += '<p style="color:var(--text-light);font-size:13px;">加载备份统计失败</p>';
      }
      html += '</div>';

      // ── 自动全量备份配置 ──
      html += '<hr style="margin:24px 0;border:none;border-top:1px solid var(--border);">';
      html += '<div class="section-title">⏰ 自动全量备份</div>';
      html += '<div id="auto-backup-config" style="padding:8px 0;">加载中...</div>';

      container.innerHTML = html;
      loadAutoBackupConfig();
    }

    async function exportBackup() {
      try {
        var data = await api.adminBackupExport();
        var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'backup-' + new Date().toISOString().slice(0,10) + '.json';
        a.click();
        URL.revokeObjectURL(url);
        showFlash('备份文件已导出', 'success', 'backup-flash');
      } catch (e) {
        showFlash('导出失败: ' + e.message, 'error', 'backup-flash');
      }
    }

    async function importBackup() {
      var input = document.getElementById('backup-file-input');
      if (!input || !input.files || !input.files[0]) {
        showFlash('请先选择备份文件', 'error', 'backup-flash');
        return;
      }
      try {
        var text = await input.files[0].text();
        var data = JSON.parse(text);
        if (!data.test_records) {
          showFlash('无效的备份文件：缺少 test_records', 'error', 'backup-flash');
          return;
        }
        if (!confirm('确定要从备份文件恢复数据吗？\n共 ' + data.test_records.length + ' 条记录，' + (data.tester_nicknames || []).length + ' 条昵称。\n已存在的记录 ID 会被跳过。')) return;
        var result = await api.adminBackupRestore(data);
        showFlash('恢复完成：' + result.restored_records + ' 条记录，' + result.restored_nicknames + ' 条昵称', 'success', 'backup-flash');
        // Refresh the backup tab
        loadBackup();
      } catch (e) {
        showFlash('恢复失败: ' + e.message, 'error', 'backup-flash');
      }
    }

    // ─── Shared ───
    function escapeHtml(str) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML.replace(/"/g, '&quot;');
    }

    async function approve(id) {
      try { await api.reviewQuestion(id, 'approved'); showFlash('已通过', 'success'); loadPending(); updatePendingBadge(); }
      catch (e) { showFlash(e.message, 'error'); }
    }
    async function reject(id) {
      try { await api.reviewQuestion(id, 'rejected'); showFlash('已驳回', 'success'); loadPending(); updatePendingBadge(); }
      catch (e) { showFlash(e.message, 'error'); }
    }
    async function deleteQuestion(id) {
      var pw = prompt('请输入管理员密码确认删除：');
      if (!pw) return;
      try {
        await api.adminDeleteQuestion(id, pw);
        showFlash('已删除', 'success');
        if (currentTab === 'all') loadAll();
        else if (currentTab === 'complaints') loadComplaints();
      }
      catch (e) { showFlash(e.message, 'error'); }
    }

    function showFlash(msg, type, targetId) {
      var container;
      if (targetId) {
        container = document.getElementById(targetId);
      } else {
        // Fallback: find or create a flash container at the bottom of admin-content
        container = document.getElementById('page-flash');
        if (!container) {
          container = document.createElement('div');
          container.id = 'page-flash';
          var content = document.getElementById('admin-content');
          if (content) content.appendChild(container);
        }
      }
      if (!container) return;
      container.innerHTML = '<div class="flash flash-' + type + '">' + msg + '</div>';
      setTimeout(function() { if (container) container.innerHTML = ''; }, 3000);
    }
  

    async function loadAutoBackupConfig() {
      try {
        var cfg = await api.adminGetAutoBackupConfig();
        var lastTime = cfg.last_backup_at ? cfg.last_backup_at.slice(0,19).replace('T', ' ') : '暂无';
        var div = document.getElementById('auto-backup-config');
        if (!div) return;
        div.innerHTML = '<div style="display:flex;flex-wrap:wrap;gap:16px;align-items:center;">' +
          '<span style="font-size:13px;color:var(--text-light);">当前间隔：</span>' +
          '<input type="number" id="backup-interval-input" value="' + (cfg.interval_hours).toFixed(1) + '" min="0.1" max="24" step="0.5" style="width:80px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:14px;">' +
          '<span style="font-size:13px;color:var(--text-light);">小时</span>' +
          '<button class="btn btn-primary" onclick="saveAutoBackupInterval()" style="padding:6px 16px;">保存间隔</button>' +
          '<button class="btn btn-outline" onclick="triggerAutoBackup()" style="padding:6px 16px;">⚡ 立即执行备份</button>' +
          '<button class="btn btn-outline" onclick="downloadLatestBackup()" style="padding:6px 16px;margin-left:4px;">⬇ 下载最新备份</button>' +
          '</div>' +
          '<p style="font-size:12px;color:var(--text-light);margin-top:8px;">上次备份：' + lastTime + ' &nbsp;|&nbsp; 间隔范围：0.1 ∼ 24 小时，修改后约 1 分钟生效</p>' +
          '<div id="backup-flash"></div>';
      } catch (e) {
        var div = document.getElementById('auto-backup-config');
        if (div) div.innerHTML = '<p style="color:var(--text-light);font-size:13px;">加载配置失败: ' + e.message + '</p>';
      }
    }

    async function saveAutoBackupInterval() {
      var input = document.getElementById('backup-interval-input');
      if (!input) return;
      var val = parseFloat(input.value);
      if (isNaN(val) || val < 0.1 || val > 24) {
        showFlash('请输入 0.1 ~ 24 之间的有效数字', 'error', 'backup-flash');
        return;
      }
      try {
        await api.adminSetAutoBackupConfig(val);
        showFlash('自动备份间隔已设置为 ' + val.toFixed(1) + ' 小时', 'success', 'backup-flash');
      } catch (e) {
        showFlash('设置失败: ' + e.message, 'error', 'backup-flash');
      }
    }

    async function triggerAutoBackup() {
      try {
        var result = await api.adminTriggerAutoBackup();
        showFlash(result.message || '自动备份已触发', 'success', 'backup-flash');
        loadAutoBackupConfig();
      } catch (e) {
        showFlash('触发失败: ' + e.message, 'error', 'backup-flash');
      }
    }


    async function downloadLatestBackup() {
      try {
        var url = api.adminDownloadLatestBackup();
        // Use a temporary anchor to trigger the download
        var a = document.createElement('a');
        a.href = url;
        a.download = '';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        showFlash('正在下载最新备份...', 'success', 'backup-flash');
      } catch (e) {
        showFlash('下载失败: ' + e.message, 'error', 'backup-flash');
      }
    }

</script>

  <!-- Edit Question Modal -->

    <div style="background:#fff;max-width:700px;margin:40px auto;border-radius:12px;padding:24px;position:relative;">

      <div class="form-group">
        <label>题目内容</label>
        <textarea id="edit-content" class="form-input" rows="3"></textarea>

      <div id="edit-options"></div>
      <button class="btn btn-sm btn-outline" onclick="addEditOption()" style="margin-bottom:12px;">+ 添加选项</button>

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
        <div class="form-group">
          <label>维度</label>
          <input type="text" id="edit-dimension" class="form-input" placeholder="如：消费与风控">

        <div class="form-group">

          <input type="number" id="edit-weight" class="form-input" step="0.5" value="1.0">
        </div>
        <div class="form-group">
          <label>限时（秒，0=不限）</label>
          <input type="number" id="edit-timelimit" class="form-input" value="0">
        </div>
      </div>

      <div class="form-group">
        <label>标签（逗号分隔）</label>
        <input type="text" id="edit-tags" class="form-input" placeholder="如：消费观, 财务管理">
      </div>

      <hr style="margin:16px 0;border:none;border-top:2px solid #f0f0f0;">

      <div class="form-group">
        <label style="color:#e88d9e;font-weight:600;">管理员密码（修改必需）</label>
        <input type="password" id="edit-password" class="form-input" placeholder="输入管理员密码确认修改">
      </div>

      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button class="btn btn-outline" onclick="closeEditModal()">取消</button>
        <button class="btn btn-primary" onclick="saveEdit()">保存修改</button>
      </div>
    </div>
  </div>
