<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上传题库 - 伴侣匹配测试</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .dimension-hint { margin-top:8px; padding:10px 14px; background:#f0f7ff; border:1px solid #d4e3f7; border-radius:8px; font-size:13px; line-height:1.6; color:var(--text-color); display:none; }
    .dimension-hint.show { display:block; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/index.html" class="nav-brand">伴侣匹配测试</a>
    <div class="nav-links">
      <a href="/index.html">首页</a>
      <a href="#" onclick="logout()" style="color:#e88d9e;">退出</a>
    </div>
  </nav>
  <div class="container">
    <div class="card">
      <h2 style="color:var(--primary-dark);margin-bottom:16px;">上传题库</h2>
      <p style="color:var(--text-light);margin-bottom:20px;">出题审核通过后，会在测试中随机出现。</p>
      <div style="background:#fff3cd;border:1px solid #ffeeba;border-radius:10px;padding:14px 18px;margin-bottom:20px;font-size:0.9em;color:#856404;">
        <strong>⚠️ 注意：分数是反着给的</strong><br>
        最正确的选项应填在 <strong>0 分</strong>（得分最低），<br>
        最离谱/最不理想的选项应填在 <strong>5 分</strong>（得分最高），<br>
        分值 0~5 共 6 档，每题最少 <strong>4 个选项</strong>、最多 <strong>6 个选项</strong>。旨在麻痹做题人，防止猜出真实评分逻辑。
      </div>
      <div class="form-group">
        <label for="q-content">题干</label>
        <textarea id="q-content" class="form-input" placeholder="描述一个场景或问题..."></textarea>
      </div>
      <div class="form-group">
        <label>题目分类</label>
        <select id="q-dimension" class="form-input">
          <option value="">—— 选择分类 ——</option>
          <option value="常识与思维弹性">常识与思维弹性</option>
          <option value="人性底线与共情基准">人性底线与共情基准</option>
          <option value="日常摩擦中的本能反应">日常摩擦中的本能反应</option>
          <option value='对"关系现实感"的认知'>对"关系现实感"的认知</option>
          <option value="其他">其他</option>
        </select>
        <div id="dimension-desc" class="dimension-hint">
          <span style="color:var(--text-light);font-style:italic;">请选择一个分类查看说明</span>
        </div>
      </div>
      <div id="options-container">
        <div class="form-group">
          <label>0 分选项（最正确 — 得分最低）</label>
          <input type="text" class="form-input option-text" placeholder="最正确的反应（0分）" data-opt="0">
        </div>
        <div class="form-group">
          <label>1 分选项</label>
          <input type="text" class="form-input option-text" placeholder="轻微的副作用" data-opt="1">
        </div>
        <div class="form-group">
          <label>2 分选项</label>
          <input type="text" class="form-input option-text" placeholder="较不理想的反应" data-opt="2">
        </div>
        <div class="form-group">
          <label>3 分选项</label>
          <input type="text" class="form-input option-text" placeholder="不理想的反应" data-opt="3">
        </div>
        <div class="form-group extra-opt" style="display:none;">
          <label>4 分选项</label>
          <input type="text" class="form-input option-text" placeholder="较严重的不理想反应" data-opt="4">
        </div>
        <div class="form-group">
          <label>5 分选项（最离谱 — 得分最高）</label>
          <input type="text" class="form-input option-text" placeholder="最离谱的反应（5分）" data-opt="5">
        </div>
        <div style="margin-top:4px;font-size:13px;color:var(--text-light);">
          <span class="toggle-link" id="toggle-extra-opts" onclick="toggleExtraOpts()">+ 添加第 5 个选项</span>
          <span style="margin:0 8px;color:var(--border);">|</span>
          <span style="font-size:12px;">至少 4 个，最多 6 个</span>
        </div>
      </div>
      <div class="form-group">
        <label>答题时限（秒）</label>
        <input type="number" id="q-time-limit" class="form-input" value="15" min="10" max="60" style="max-width:120px;">
        <span style="color:var(--text-light);font-size:0.85em;">最短 10 秒，最长 60 秒</span>
      </div>
      <div class="form-group">
        <label>题目权重</label>
        <div style="display:flex;gap:12px;">
          <label style="cursor:pointer;display:flex;align-items:center;gap:4px;font-size:14px;font-weight:400;">
            <input type="radio" name="q-weight" value="1" checked> 普通题（×1）
          </label>
          <label style="cursor:pointer;display:flex;align-items:center;gap:4px;font-size:14px;font-weight:400;">
            <input type="radio" name="q-weight" value="2"> 重要题（×2）
          </label>
          <label style="cursor:pointer;display:flex;align-items:center;gap:4px;font-size:14px;font-weight:400;">
            <input type="radio" name="q-weight" value="3"> 核心题（×3）
          </label>
        </div>
        <span style="color:var(--text-light);font-size:0.85em;">权重越大，该题对最终分数的影响越大</span>
      </div>
      <div class="form-group">
        <label>标签（用逗号分隔）</label>
        <input type="text" id="q-tags" class="form-input" placeholder="例如: 情感, 物质, 独立">
      </div>
      <div id="flash-container"></div>
      <button class="btn btn-primary btn-block" onclick="doSubmit()">提交审核</button>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    // Auth check — redirect to login if not logged in
    if (!api.isLoggedIn()) {
      window.location.href = '/login.html';
    }

    function logout() { api.clearToken(); window.location.href = '/index.html'; }

    // Dimension descriptions
    var dimDescs = {
      '常识与思维弹性': '考察生活常识、逻辑反诈意识、思维变通能力和抓大放小的判断力。',
      '人性底线与共情基准': '考察对暴力、霸凌、隐私权、身体自主权等基本人道的立场，以及对社会弱者的共情能力。',
      '日常摩擦中的本能反应': '模拟日常相处中的分歧、失误、疏忽等场景，考察情绪管理、包容度与沟通模式。',
      '对"关系现实感"的认知': '考察对长期关系中的平淡期、衰老、财务压力、责任分担等现实维度的认知成熟度。',
    };
    document.getElementById('q-dimension').addEventListener('change', function() {
      var box = document.getElementById('dimension-desc');
      var desc = dimDescs[this.value];
      if (desc) {
        box.innerHTML = '<strong>' + this.value + '</strong> — ' + desc;
        box.classList.add('show');
      } else {
        box.innerHTML = '<span style="color:var(--text-light);font-style:italic;">请选择一个分类查看说明</span>';
        box.classList.remove('show');
      }
    });

    // Toggle show/hide the 4 分 option (5th option)
    var extraOptVisible = false;
    function toggleExtraOpts() {
      extraOptVisible = !extraOptVisible;
      var el = document.querySelector('.extra-opt');
      var link = document.getElementById('toggle-extra-opts');
      if (!el) return;
      el.style.display = extraOptVisible ? '' : 'none';
      link.textContent = extraOptVisible ? '− 移除第 5 个选项' : '+ 添加第 5 个选项';
    }

    async function doSubmit() {
      const content = document.getElementById('q-content').value.trim();
      if (!content) { showFlash('请输入题干', 'error'); return; }
      const opts = document.querySelectorAll('.option-text');
      const options = [];
      opts.forEach(function(o) {
        if (o.value.trim()) options.push({ text: o.value.trim(), score: parseInt(o.dataset.opt) });
      });
      if (options.length < 4) { showFlash('请至少填写 4 个选项（最多 6 个）', 'error'); return; }
      if (options.length > 6) { showFlash('最多只能 6 个选项', 'error'); return; }
      const dimension = document.getElementById('q-dimension').value || null;
      const timeLimit = parseInt(document.getElementById('q-time-limit').value) || 15;
      const tags = document.getElementById('q-tags').value.split(',').map(function(t) { return t.trim(); }).filter(Boolean);
      // Read selected weight
      var weightEl = document.querySelector('input[name="q-weight"]:checked');
      var weight = weightEl ? parseInt(weightEl.value) : 1;
      if (![1, 2, 3].includes(weight)) weight = 1;
      try {
        const res = await api.submitQuestion({ content: content, options: options, dimension: dimension, tags: tags, time_limit: timeLimit, weight: weight });
        showFlash('提交成功，等待管理员审核', 'success');
        document.getElementById('q-content').value = '';
        document.querySelectorAll('.option-text').forEach(function(o) { o.value = ''; });
        document.getElementById('q-tags').value = '';
      } catch (e) {
        showFlash('提交失败: ' + e.message, 'error');
      }
    }
  </script>
</body>
</html>
