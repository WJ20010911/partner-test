<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 伴侣匹配测试</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav">
    <a href="/index.html" class="nav-brand">伴侣匹配测试</a>
    <div class="nav-links">
      <a href="/index.html">首页</a>
      <a href="/login.html">上传题库</a>
    </div>
  </nav>
  <div class="container" style="max-width:420px;">
    <a href="/login.html" style="display:inline-flex;align-items:center;gap:4px;color:var(--primary-dark);text-decoration:none;font-size:14px;margin-bottom:8px;">← 返回登录</a>
    <div class="card">
      <h2 style="color:var(--primary-dark);margin-bottom:20px;text-align:center;">注册</h2>
      <p style="text-align:center;color:var(--text-light);margin-bottom:20px;">注册后可以贡献题目，帮助完善题库</p>
      <div id="flash-container"></div>
      <div class="form-group">
        <label for="email">邮箱</label>
        <input type="email" id="email" class="form-input" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label for="username">用户名（选填，用于致谢展示）</label>
        <input type="text" id="username" class="form-input" placeholder="如：小明">
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" class="form-input" placeholder="至少6位">
      </div>
      <div class="form-group">
        <label for="password2">确认密码</label>
        <input type="password" id="password2" class="form-input" placeholder="再次输入密码">
      </div>
      <button class="btn btn-primary btn-block" onclick="doRegister()">注册</button>
      <p style="text-align:center;margin-top:16px;color:var(--text-light);font-size:0.9em;">
        已有账号？<a href="/login.html" style="color:var(--primary-dark);">登录</a>
      </p>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    async function doRegister() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      const username = document.getElementById('username').value.trim();
      if (!email || !password) { showFlash('请填写邮箱和密码', 'error'); return; }
      if (password !== password2) { showFlash('两次密码不一致', 'error'); return; }
      if (password.length < 6) { showFlash('密码至少6位', 'error'); return; }
      try {
        const res = await api.register(email, password, username);
        // Also set username if provided
        api.setToken(res.access_token);
        showFlash('注册成功', 'success');
        setTimeout(function() { window.location.href = '/submit.html'; }, 500);
      } catch (e) {
        showFlash('注册失败: ' + e.message, 'error');
      }
    }
  </script>
</body>
</html>
