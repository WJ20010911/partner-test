<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>你适合什么样的伴侣？</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav">
  <a href="/index.html" class="nav-brand">伴侣匹配测试</a>
  <div class="nav-links">
    <a href="/index.html">首页</a>
    <a href="/login.html">上传题库</a>
    <a href="javascript:void(0)" onclick="showContributors()" style="cursor:pointer;">致谢</a>
    <a href="javascript:void(0)" onclick="showTesterRegister()" style="cursor:pointer;font-size:0.85em;">🧪 登记昵称</a>
  </div>
</nav>
  <div class="container">
    <div class="hero">
      <div class="illustration">💕</div>
      <h1>你适合什么样的伴侣？</h1>
      <p>一套科学的恋爱价值观自测题，帮你了解自己在感情中的真实偏好与期待。只需几分钟，发现你的理想伴侣画像。</p>
      <a href="/test.html" class="btn btn-primary" style="font-size:1.15em;padding:16px 48px;">开始测试</a>
    </div>
    <div class="card" style="text-align:center;">
      <p style="color:var(--text-light);margin-bottom:12px;">已参与测试 <strong id="test-count" style="color:var(--primary-dark);">--</strong> 人次</p>
      <p style="color:var(--text-muted);font-size:0.9em;">所有数据匿名处理，结果仅供个人参考</p>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;">
      <div class="card" style="text-align:center;">
        <h3 style="color:var(--primary-dark);margin-bottom:8px;">📝 情景式题目</h3>
        <p style="color:var(--text-light);font-size:0.9em;">真实的恋爱场景，选择最接近你内心的答案</p>
      </div>
      <div class="card" style="text-align:center;">
        <h3 style="color:var(--primary-dark);margin-bottom:8px;">🎯 精准分析</h3>
        <p style="color:var(--text-light);font-size:0.9em;">多维度评估你的恋爱价值观倾向</p>
      </div>
      <div class="card" style="text-align:center;">
        <h3 style="color:var(--primary-dark);margin-bottom:8px;">🔒 隐私保护</h3>
        <p style="color:var(--text-light);font-size:0.9em;">结果仅你自己可见，数据安全有保障</p>
      </div>
    </div>
  </div>
  <div class="footer">
    <p>伴侣匹配测试 &copy; 2026</p>
    <p style="margin-top:4px;"><a href="/verify.html" style="color:var(--text-muted);text-decoration:underline;">结果验真</a></p>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    // ── 致谢窗口 ──
    var currentSort = 'time';

    function renderContributors(list) {
      var sort = currentSort;
      var sorted = list.slice();
      if (sort === 'count') {
        sorted.sort(function(a, b) { return b.count - a.count; });
      } else {
        sorted.sort(function(a, b) { return (a.time || '') < (b.time || '') ? 1 : -1; });
      }

      // Reuse existing overlay or create new
      var overlay = document.getElementById('contrib-overlay');
      if (!overlay) return;
      var box = overlay.querySelector('.contrib-box');
      if (!box) return;

      // Keep title and sort bar, replace list
      var title = box.querySelector('.contrib-title');
      var sortBar = box.querySelector('.contrib-sort');
      var oldList = box.querySelector('.contrib-list');
      var closeBtn = box.querySelector('.contrib-close');

      // Clear everything after sort bar
      while (box.lastChild && box.lastChild !== sortBar) {
        if (box.lastChild === closeBtn) { box.removeChild(closeBtn); break; }
        box.removeChild(box.lastChild);
      }

      var listDiv = document.createElement('div');
      listDiv.className = 'contrib-list';
      listDiv.style.cssText = 'max-height:300px;overflow-y:auto;margin-bottom:12px;';

      if (sorted.length === 0) {
        var empty = document.createElement('p');
        empty.style.cssText = 'color:var(--text-light);text-align:center;padding:20px 0;';
        empty.textContent = '暂无贡献者';
        listDiv.appendChild(empty);
      } else {
        sorted.forEach(function(item) {
          var row = document.createElement('div');
          row.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);';

          var nameSpan = document.createElement('span');
          nameSpan.style.cssText = 'font-size:14px;color:var(--text);';
          if (item.type === 'tester') {
            nameSpan.textContent = '🧪 ' + item.username;
          } else {
            nameSpan.textContent = '📝 ' + item.username;
          }
          row.appendChild(nameSpan);

          var countSpan = document.createElement('span');
          countSpan.style.cssText = 'font-size:13px;color:var(--text-muted);';
          if (item.type === 'uploader') {
            countSpan.textContent = item.count + ' 题';
          } else {
            countSpan.textContent = item.count + ' 次测试';
          }
          row.appendChild(countSpan);

          listDiv.appendChild(row);
        });
      }

      box.appendChild(listDiv);
      box.appendChild(closeBtn);
    }

    function showContributors() {
      if (document.getElementById('contrib-overlay')) return;

      var overlay = document.createElement('div');
      overlay.id = 'contrib-overlay';
      overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;display:flex;align-items:center;justify-content:center;';

      var box = document.createElement('div');
      box.className = 'contrib-box';
      box.style.cssText = 'background:#fff;max-width:420px;width:90%;border-radius:12px;padding:24px;position:relative;';

      var title = document.createElement('h3');
      title.className = 'contrib-title';
      title.style.cssText = 'color:var(--primary-dark);margin-bottom:12px;';
      title.textContent = '致谢';
      box.appendChild(title);

      var hint = document.createElement('p');
      hint.style.cssText = 'color:var(--text-light);font-size:13px;margin-bottom:12px;';
      hint.textContent = '📝 上传题目者  🧪 参与测试者';
      box.appendChild(hint);

      // Sort buttons
      var sortBar = document.createElement('div');
      sortBar.className = 'contrib-sort';
      sortBar.style.cssText = 'display:flex;gap:8px;margin-bottom:12px;';

      var sortTime = document.createElement('button');
      sortTime.className = 'btn btn-sm' + (currentSort === 'time' ? ' btn-primary' : ' btn-secondary');
      sortTime.textContent = '⏱ 最新';
      sortTime.onclick = function() {
        currentSort = 'time';
        api.getContributors().then(function(list) { renderContributors(list); });
        sortTime.className = 'btn btn-sm btn-primary';
        sortCount.className = 'btn btn-sm btn-secondary';
      };
      sortBar.appendChild(sortTime);

      var sortCount = document.createElement('button');
      sortCount.className = 'btn btn-sm' + (currentSort === 'count' ? ' btn-primary' : ' btn-secondary');
      sortCount.textContent = '📊 题量';
      sortCount.onclick = function() {
        currentSort = 'count';
        api.getContributors().then(function(list) { renderContributors(list); });
        sortCount.className = 'btn btn-sm btn-primary';
        sortTime.className = 'btn btn-sm btn-secondary';
      };
      sortBar.appendChild(sortCount);

      box.appendChild(sortBar);

      // Close button
      var closeBtn = document.createElement('button');
      closeBtn.className = 'btn btn-outline contrib-close';
      closeBtn.style.cssText = 'margin-top:8px;width:100%;';
      closeBtn.textContent = '关闭';
      closeBtn.onclick = function() { overlay.remove(); };
      box.appendChild(closeBtn);

      overlay.appendChild(box);
      overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
      document.body.appendChild(overlay);

      // Load and render
      api.getContributors().then(function(list) {
        renderContributors(list);
      }).catch(function(e) {
        var p = document.createElement('p');
        p.style.cssText = 'color:var(--text-light);text-align:center;padding:20px;';
        p.textContent = '加载失败: ' + e.message;
        box.appendChild(p);
      });
    }

    // ── 已参与测试人数 ──
    function loadTestCount() {
      api.getPublicStats().then(function(data) {
        document.getElementById('test-count').textContent = data.total_tests || 0;
      }).catch(function() {
        // silently ignore, keep current value
      });
    }

    // 页面加载时立即更新，之后每 60 秒刷新一次
    loadTestCount();
    setInterval(loadTestCount, 60000);

    // ── 测试人员登记昵称 ──
    function showTesterRegister() {
      if (document.getElementById('tester-reg-overlay')) return;

      var overlay = document.createElement('div');
      overlay.id = 'tester-reg-overlay';
      overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;display:flex;align-items:center;justify-content:center;';

      var box = document.createElement('div');
      box.style.cssText = 'background:#fff;max-width:380px;width:90%;border-radius:12px;padding:24px;position:relative;text-align:center;';

      box.innerHTML =
        '<h3 style="color:var(--primary-dark);margin-bottom:12px;">🧪 测试人员登记</h3>' +
        '<p style="color:var(--text-light);font-size:14px;margin-bottom:16px;">' +
        '如果你参与过测试，输入结果页的<strong>验真码</strong>即可登记昵称，' +
        '你的名字将出现在<a href="javascript:void(0)" onclick="showContributors()" style="color:var(--primary-dark);">致谢</a>中。</p>' +
        '<input id="tester-token-input" type="text" placeholder="输入你的验真码" ' +
        'style="width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:8px;font-size:15px;box-sizing:border-box;margin-bottom:8px;">' +
        '<p id="tester-token-status" style="color:var(--text-muted);font-size:13px;margin-bottom:12px;display:none;"></p>' +
        '<input id="tester-nick-input" type="text" maxlength="20" placeholder="输入昵称（最多20字）" ' +
        'style="width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:8px;font-size:15px;box-sizing:border-box;margin-bottom:12px;display:none;">' +
        '<div style="display:flex;gap:8px;">' +
        '<button id="tester-reg-cancel" class="btn btn-outline" style="flex:1;">取消</button>' +
        '<button id="tester-reg-submit" class="btn btn-primary" style="flex:1;">验证并登记</button>' +
        '</div>';

      overlay.appendChild(box);
      overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
      document.body.appendChild(overlay);

      var tokenInput = document.getElementById('tester-token-input');
      var nickInput = document.getElementById('tester-nick-input');
      var statusEl = document.getElementById('tester-token-status');
      var submitBtn = document.getElementById('tester-reg-submit');
      var cancelBtn = document.getElementById('tester-reg-cancel');

      var validatedToken = null;

      submitBtn.onclick = function() {
        var token = tokenInput.value.trim();

        // Phase 1: validate token
        if (!validatedToken) {
          if (!token) { alert('请输入验真码'); return; }
          submitBtn.disabled = true;
          submitBtn.textContent = '验证中...';
          api.verifyByToken(token).then(function(rec) {
            validatedToken = token;
            statusEl.style.display = 'block';
            statusEl.style.color = 'var(--success)';
            statusEl.textContent = '✅ 验真码有效！请输入昵称';
            tokenInput.style.display = 'none';
            nickInput.style.display = 'block';
            submitBtn.textContent = '提交昵称';
            submitBtn.disabled = false;
          }).catch(function() {
            statusEl.style.display = 'block';
            statusEl.style.color = 'var(--danger)';
            statusEl.textContent = '❌ 验真码无效，请检查后重试';
            submitBtn.disabled = false;
            submitBtn.textContent = '验证并登记';
          });
          return;
        }

        // Phase 2: save nickname
        var nick = nickInput.value.trim();
        if (!nick) { alert('请输入昵称'); return; }
        submitBtn.disabled = true;
        submitBtn.textContent = '提交中...';
        api.setTesterNickname(validatedToken, nick).then(function() {
          overlay.remove();
          alert('🎉 登记成功！你的昵称已加入致谢列表。');
        }).catch(function(e) {
          alert('提交失败: ' + e.message);
          submitBtn.disabled = false;
          submitBtn.textContent = '提交昵称';
        });
      };

      cancelBtn.onclick = function() {
        if (validatedToken) {
          // Reset to phase 1
          validatedToken = null;
          tokenInput.style.display = 'block';
          nickInput.style.display = 'none';
          statusEl.style.display = 'none';
          submitBtn.textContent = '验证并登记';
          tokenInput.value = '';
          return;
        }
        overlay.remove();
      };
    }
  </script>
</body>
</html>
